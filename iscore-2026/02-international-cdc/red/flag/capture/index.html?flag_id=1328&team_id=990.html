<script>

    $(document).ready(function () {

        

        //setup content height
        $(window).resize(function () {
            var new_height = $(window).height() - 55;
            if (new_height < 675) new_height = 675;
            $("#content").css('min-height', new_height);
        });

        $(window).trigger('resize');

        $('input.datepicker-input').datepicker({orientation: "bottom auto"});
        $('.notifications').each(function () {
            var that = $(this);
            var message = that.attr('data-row');
            var color = that.attr('title');
            that.notify({
                message: {text: message},
                type: color,
                fadeOut: {enabled: true, delay: 4500}
            }).show();
        });

        $('.preview-tab').on('click', function () {
            var that = $(this);
            var preview = $(that.attr('href'));
            var edit = preview.siblings('.tab-pane');
            var textarea = $('textarea', edit);
            $('.markdown-content', preview).html(marked(textarea.val()));
        });

        $('.markdown-content').each(function (i, e) {
            var item = $(e);
            item.html(marked(item.html()));
        });
    });
</script>
